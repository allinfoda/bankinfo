<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страны и Банки</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0e0e0f;
  --surface:   #141416;
  --surface2:  #1c1c1f;
  --surface3:  #242428;
  --border:    #2a2a2e;
  --gold:      #c9a84c;
  --gold-dim:  #8a6e2f;
  --gold-glow: rgba(201,168,76,0.12);
  --text:      #e8e4dc;
  --muted:     #6b6860;
  --faint:     #3a3835;
  --buy:       #4caf7d;
  --sell:      #cf6679;
  --esim-bg:   rgba(76,130,175,0.1);
  --esim-txt:  #7ab3d4;
  --binance-bg:rgba(201,168,76,0.08);
  --binance-txt:#c9a84c;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Albert Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:flex-end;
  padding:0 32px;height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.header-nav{display:flex;gap:10px;align-items:center;}

.btn{
  font-family:'Albert Sans',sans-serif;
  padding:7px 18px;border-radius:3px;
  font-size:12px;font-weight:600;letter-spacing:0.6px;
  text-transform:uppercase;cursor:pointer;border:none;
  transition:all 0.2s;
}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--faint);}
.btn-gold{background:var(--gold);color:#0e0e0f;font-weight:700;}
.btn-gold:hover{background:#dbb85a;}

.admin-indicator{
  display:none;align-items:center;gap:7px;
  background:var(--gold-glow);border:1px solid rgba(201,168,76,0.25);
  padding:4px 12px;border-radius:2px;font-size:11px;
  color:var(--gold);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
}
.admin-indicator.visible{display:flex;}
.admin-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 52px);}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;min-width:240px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-search{padding:14px 16px;border-bottom:1px solid var(--border);}
.sidebar-search input{
  width:100%;background:var(--bg);
  border:1px solid var(--border);border-radius:3px;
  padding:8px 12px;color:var(--text);
  font-family:'Albert Sans',sans-serif;font-size:13px;
  outline:none;transition:border-color 0.2s;
}
.sidebar-search input:focus{border-color:var(--gold-dim);}
.sidebar-search input::placeholder{color:var(--muted);}
.search-mode-label{font-size:10px;color:var(--muted);margin-top:6px;padding:0 2px;display:none;letter-spacing:0.5px;text-transform:uppercase;}
.search-mode-label.visible{display:block;}

.country-list{overflow-y:auto;flex:1;padding:4px 0;}
.search-section-header{
  font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;padding:12px 18px 4px;font-weight:600;
}
.country-item{
  padding:10px 18px;cursor:pointer;
  display:flex;align-items:center;gap:0;
  font-size:13px;color:var(--muted);
  transition:all 0.15s;
  position:relative;
}
.country-item:hover{background:var(--surface2);color:var(--text);}
.country-item.active{color:var(--gold);background:var(--gold-glow);}
.country-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:2px;background:var(--gold);
}
.country-item .cname{flex:1;}
.country-item .count{
  font-size:11px;color:var(--muted);
  background:var(--surface3);padding:1px 7px;border-radius:2px;
}
.country-item.active .count{background:var(--gold-glow);color:var(--gold);}

.bank-search-item{
  padding:9px 18px;cursor:pointer;
  font-size:13px;color:var(--muted);
  transition:background 0.15s;
  display:flex;flex-direction:column;gap:2px;
}
.bank-search-item:hover{background:var(--surface2);color:var(--text);}
.bsi-name{font-weight:500;color:var(--text);}
.bsi-country{font-size:11px;color:var(--muted);}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:40px 48px;}
.main-header{
  margin-bottom:32px;
  display:flex;justify-content:space-between;align-items:flex-end;
}
.main-title{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;font-weight:600;letter-spacing:-0.5px;
  color:var(--text);line-height:1;
}
.main-subtitle{
  color:var(--muted);font-size:12px;margin-top:6px;
  letter-spacing:1px;text-transform:uppercase;
}

/* ── TABLE ── */
.bank-table{width:100%;border-collapse:collapse;margin-bottom:32px;}
.bank-table th{
  text-align:left;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:2px;
  padding:8px 16px;border-bottom:1px solid var(--border);
  font-weight:600;font-family:'Albert Sans',sans-serif;
}
.bank-table td{padding:0;}
.bank-row{cursor:pointer;transition:background 0.12s;}
.bank-row:hover td{background:var(--surface2);}
.bank-row td{padding:13px 16px;font-size:13px;vertical-align:middle;}
.bank-name{font-weight:500;color:var(--text);display:flex;align-items:center;gap:10px;}
.price-buy{color:var(--buy);font-weight:600;font-variant-numeric:tabular-nums;}
.price-sell{color:var(--sell);font-weight:600;font-variant-numeric:tabular-nums;}
.price-na{color:var(--faint);}
.has-desc{
  font-size:10px;color:var(--gold-dim);
  background:var(--gold-glow);border:1px solid rgba(201,168,76,0.15);
  padding:2px 8px;border-radius:2px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
}

/* ── ROW HIGHLIGHTS ── */
.bank-row.row-esim td{background:rgba(76,130,175,0.05);}
.bank-row.row-esim:hover td{background:rgba(76,130,175,0.1);}
.bank-row.row-esim .bank-name{color:var(--esim-txt);}
.bank-row.row-binance td{background:rgba(201,168,76,0.04);}
.bank-row.row-binance:hover td{background:rgba(201,168,76,0.09);}
.bank-row.row-binance .bank-name{color:var(--binance-txt);}
.bank-row.row-roaming td{background:rgba(140,200,160,0.06);}
.bank-row.row-roaming:hover td{background:rgba(140,200,160,0.12);}
.bank-row.row-roaming .bank-name{color:#7ec89a;}

/* confirm dialog */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:600;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.confirm-overlay.open{display:flex;}
.confirm-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:28px 32px;width:320px;
  animation:fadeUp 0.18s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.confirm-box p{font-size:14px;color:var(--text);margin-bottom:22px;line-height:1.6;}
.confirm-actions{display:flex;gap:10px;justify-content:flex-end;}
/* undo button */
.btn-undo{
  font-family:'Albert Sans',sans-serif;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:7px 16px;border-radius:3px;
  font-size:12px;font-weight:600;letter-spacing:0.5px;
  text-transform:uppercase;cursor:pointer;transition:all 0.2s;
}
.btn-undo:hover:not([disabled]){color:var(--gold);border-color:var(--gold-dim);}
.btn-undo[disabled]{opacity:0.3;cursor:default;}

/* ── DETAIL PANEL ── */
.bank-detail{
  position:fixed;right:0;top:52px;
  width:380px;height:calc(100vh - 52px);
  background:var(--surface);border-left:1px solid var(--border);
  display:none;flex-direction:column;z-index:50;
  animation:slideIn 0.2s ease;
  box-shadow:-12px 0 40px rgba(0,0,0,0.4);
}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.bank-detail.open{display:flex;}
.detail-header{
  padding:28px 28px 20px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.detail-title{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:600;line-height:1.2;
}
.detail-country{
  color:var(--muted);font-size:11px;margin-top:5px;
  letter-spacing:1px;text-transform:uppercase;
}
.close-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);width:30px;height:30px;border-radius:3px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all 0.2s;flex-shrink:0;
}
.close-btn:hover{color:var(--text);border-color:var(--faint);}
.detail-prices{
  display:flex;gap:1px;padding:20px 28px;
  border-bottom:1px solid var(--border);
}
.price-card{
  flex:1;padding:16px 20px;background:var(--surface2);border-radius:3px;
}
.price-card:first-child{margin-right:8px;}
.price-label-sm{
  font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:8px;font-weight:600;
}
.price-val{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:600;line-height:1;
}
.detail-desc{flex:1;padding:24px 28px;overflow-y:auto;}
.desc-label{
  font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:14px;font-weight:600;
}
.desc-content{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;}
.desc-empty{color:var(--muted);font-size:13px;font-style:italic;}
.detail-footer{padding:16px 28px;border-top:1px solid var(--border);}

/* ── OVERLAYS ── */
.admin-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  z-index:200;display:none;
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.admin-overlay.open{display:flex;}

.modal-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  width:520px;max-height:85vh;
  overflow-y:auto;padding:36px;
  animation:fadeUp 0.2s ease;
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-box h2{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:600;margin-bottom:28px;color:var(--gold);
}
.modal-sm{width:380px;}

.form-group{margin-bottom:16px;}
.form-label{
  display:block;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;
}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--bg);
  border:1px solid var(--border);border-radius:3px;
  padding:10px 13px;color:var(--text);
  font-family:'Albert Sans',sans-serif;font-size:13px;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold-dim);}
.form-select option{background:var(--surface);}
.form-textarea{resize:vertical;min-height:120px;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end;}
.login-hint{color:var(--muted);font-size:13px;margin-bottom:22px;line-height:1.5;}
.login-error{color:var(--sell);font-size:12px;margin-top:8px;display:none;font-weight:600;letter-spacing:0.3px;}

/* ── TABS ── */
.admin-tabs{display:flex;margin-bottom:28px;gap:0;border-bottom:1px solid var(--border);}
.admin-tab{
  flex:1;padding:10px;text-align:center;cursor:pointer;
  font-size:12px;color:var(--muted);transition:all 0.2s;
  font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.admin-tab:hover:not(.active){color:var(--text);}

/* ── MANAGE LIST ── */
.manage-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--bg);border-radius:3px;
  margin-bottom:6px;font-size:13px;border:1px solid var(--border);
}
.manage-item-name{flex:1;font-weight:500;}
.manage-item-country{color:var(--muted);font-size:11px;}
.manage-item-actions{display:flex;gap:6px;}
.btn-edit{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:4px 12px;border-radius:3px;
  cursor:pointer;font-family:'Albert Sans',sans-serif;
  font-size:11px;transition:all 0.2s;font-weight:600;
  letter-spacing:0.5px;text-transform:uppercase;
}
.btn-edit:hover{color:var(--text);border-color:var(--faint);}
.btn-del{
  background:transparent;border:1px solid transparent;
  color:var(--muted);padding:4px 12px;border-radius:3px;
  cursor:pointer;font-family:'Albert Sans',sans-serif;
  font-size:11px;transition:all 0.2s;font-weight:600;
  letter-spacing:0.5px;text-transform:uppercase;
}
.btn-del:hover{color:var(--sell);border-color:var(--sell);background:rgba(207,102,121,0.06);}

/* ── STATUS ── */
.status-bar{
  position:fixed;bottom:24px;right:24px;
  background:var(--gold);color:#0e0e0f;
  padding:10px 20px;border-radius:3px;
  font-weight:700;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;
  display:none;z-index:500;animation:fadeUp 0.2s ease;
  box-shadow:0 4px 24px rgba(201,168,76,0.3);
}
.status-bar.show{display:block;}

/* ── DIVIDER ── */
.section-divider{
  height:1px;background:var(--border);margin:0 0 0 0;
}
.manage-item { transition: background 0.15s, opacity 0.15s; }

/* ── MOBILE ── */
.hamburger{
  display:none;background:transparent;border:none;
  color:var(--muted);cursor:pointer;padding:8px;
  flex-direction:column;gap:5px;align-items:center;justify-content:center;
}
.hamburger span{display:block;width:20px;height:2px;background:currentColor;border-radius:1px;transition:all 0.2s;}
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:149;backdrop-filter:blur(2px);
}
.sidebar-overlay.open{display:block;}

@media(max-width:768px){
  body{overflow:auto;}

  header{padding:0 16px;justify-content:space-between;}
  .hamburger{display:flex;}
  .btn{padding:6px 12px;font-size:11px;}
  .admin-indicator{font-size:10px;padding:3px 8px;}

  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 52px);}

  .sidebar{
    position:fixed;left:0;top:52px;bottom:0;
    width:280px;z-index:150;
    transform:translateX(-100%);
    transition:transform 0.25s ease;
    overflow-y:auto;
  }
  .sidebar.open{transform:translateX(0);}

  .main{
    width:100%;padding:20px 16px;
    min-height:calc(100vh - 52px);
  }
  .main-title{font-size:28px;}
  .main-subtitle{font-size:11px;}
  .main-header{flex-direction:column;align-items:flex-start;gap:12px;margin-bottom:20px;}

  /* table → card layout */
  .bank-table thead{display:none;}
  .bank-table tbody,.bank-table tr,.bank-table td{display:block;width:100%;}
  .bank-row{
    background:var(--surface);border-radius:4px;
    margin-bottom:8px;border:1px solid var(--border);
    overflow:hidden;
  }
  .bank-row td{padding:0;}
  .bank-row td:first-child{
    padding:12px 14px 6px;
    border-bottom:none;
  }
  .bank-row td:nth-child(2),
  .bank-row td:nth-child(3){
    display:inline-block;width:auto;
    padding:4px 14px;
  }
  .bank-row td:nth-child(2){padding-left:14px;}
  .bank-row td:last-child{padding:4px 14px 12px;display:block;}
  .bank-row td:last-child:empty{padding:0;}
  .bank-name{font-size:14px;}

  /* detail panel full screen on mobile */
  .bank-detail{
    width:100%;top:52px;
    border-left:none;
  }

  /* modals full width on mobile */
  .modal-box,.modal-sm{
    width:calc(100vw - 24px);max-width:500px;
    padding:24px 20px;max-height:90vh;
  }
  .admin-tabs .admin-tab{font-size:11px;padding:8px 6px;}
  .form-row{grid-template-columns:1fr 1fr;}

  .status-bar{bottom:16px;right:12px;left:12px;text-align:center;}

  .confirm-box{width:calc(100vw - 32px);padding:22px 20px;}
}

@media(max-width:400px){
  .form-row{grid-template-columns:1fr;}
  .modal-actions{flex-direction:column;}
  .modal-actions .btn,.modal-actions .btn-undo{width:100%;text-align:center;}
}
</style>
</head>
<body>

<header>
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Меню">
    <span></span><span></span><span></span>
  </button>
  <div class="header-nav">
    <div class="admin-indicator" id="adminIndicator">
      <div class="admin-dot"></div>Админ
    </div>
    <button class="btn btn-ghost" id="adminLoginBtn" onclick="openLogin()">Войти как админ</button>
    <button class="btn btn-gold" id="adminPanelBtn" onclick="openAdmin()" style="display:none">Управление</button>
    <button class="btn btn-ghost" id="adminLogoutBtn" onclick="logout()" style="display:none">Выйти</button>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <input type="text" id="sidebarSearch" placeholder="Поиск..." oninput="handleSearch()">
      <div class="search-mode-label" id="searchModeLabel">Результаты поиска</div>
    </div>
    <div class="country-list" id="countryList"></div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<!-- BANK DETAIL -->
<div class="bank-detail" id="bankDetail">
  <div class="detail-header">
    <div>
      <div class="detail-title" id="detailName"></div>
      <div class="detail-country" id="detailCountry"></div>
    </div>
    <button class="close-btn" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-prices">
    <div class="price-card">
      <div class="price-label-sm">Закуп</div>
      <div class="price-val price-buy" id="detailBuy"></div>
    </div>
    <div class="price-card">
      <div class="price-label-sm">Продажа</div>
      <div class="price-val price-sell" id="detailSell"></div>
    </div>
  </div>
  <div class="detail-desc">
    <div class="desc-label">Описание</div>
    <div id="detailDesc"></div>
  </div>
  <div class="detail-footer" id="detailFooter" style="display:none">
    <button class="btn btn-gold" style="width:100%" onclick="openEditDesc()">Редактировать описание</button>
  </div>
</div>

<!-- LOGIN -->
<div class="admin-overlay" id="loginOverlay">
  <div class="modal-box modal-sm">
    <h2>Вход</h2>
    <p class="login-hint">Введите пароль для доступа к панели управления</p>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="loginError">Неверный пароль</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeLogin()">Отмена</button>
      <button class="btn btn-gold" onclick="doLogin()">Войти</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-overlay" id="adminOverlay">
  <div class="modal-box">
    <h2>Панель управления</h2>
    <div class="admin-tabs">
      <div class="admin-tab active" id="tab1" onclick="switchTab(1)">Добавить банк</div>
      <div class="admin-tab" id="tab2" onclick="switchTab(2)">Список банков</div>
      <div class="admin-tab" id="tab3" onclick="switchTab(3)">Страны</div>
    </div>

    <div id="tabContent1">
      <div class="form-group">
        <label class="form-label">Страна</label>
        <select class="form-select" id="formCountry"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Название банка</label>
        <input type="text" class="form-input" id="formName">
      </div>
      <div class="form-row">
        <div class="form-group">

<script>

let isAdmin = false;
let selectedCountry = null;
let selectedBank = null;
let data = { countries: [], banks: [] };

  'Нигерия':'🇳🇬','Пакистан':'🇵🇰','Колумбия':'🇨🇴','Индия':'🇮🇳'

function initData() {
  const saved = localStorage.getItem('bankportal_data');
  if (saved) { data = JSON.parse(saved); return; }
  const raw = [
    ['Аргентина','Astropay','20','35'],['Аргентина','Persanal','20','50'],
    ['Аргентина','Buenbit','25','60'],['Аргентина','Fiwind Gold','25','55'],
    ['Аргентина','Ripio','25','55'],['Аргентина','Viapago','30','70'],
    ['Аргентина','App Ypf','25','60'],['Аргентина','Global 66','25','60'],
    ['Аргентина','Onda','25','60'],['Аргентина','Tinpay','20','60'],
    ['Аргентина','IEB+','25','60'],['Аргентина','Pago 24','25','60'],
    ['Аргентина','Bivo','25','60'],['Аргентина','Wayni','25','50'],
    ['Аргентина','ClaroPay','35','70'],['Аргентина','Lemon Cash','40','140'],
    ['Аргентина','Gopay','—','70'],['Аргентина','Lemon + video','55','160'],
    ['Аргентина','Al2','35','80'],['Аргентина','Cuidad','60','130'],
    ['Аргентина','Hipotecario','65','330'],['Аргентина','Naranja','65','150'],
    ['Аргентина','Esim','30','40'],['Аргентина','Binance/Bybit','15','35'],
    ['Мексика','Asp pago','55','100'],['Мексика','Now Bank','—','100'],
    ['Мексика','Mifel','55','130'],['Мексика','Binance/Bybit','20','30'],
    ['Перу','Lemon Cash','100','170'],['Перу','Tulkit Pay','90','160'],
    ['Перу','Interbank','125','180'],['Перу','Panda','90','—'],
    ['Перу','Scotia','125','—'],['Перу','Binance/Bybit','15','30'],
    ['Боливия','Bisa','—','190'],['Боливия','Tehereo (Ideapro)','95','190'],
    ['Боливия','Yape','100','200'],['Боливия','BNB','110','—'],
    ['Боливия','Binance/Bybit','20','30'],
    ['Чили','Mi Banco (Banco de Chile)','90','130'],['Чили','Binance/Bybit','10','30'],
    ['Венесуэла','UBI','95','130'],['Венесуэла','Binance/Bybit','15','30'],
    ['Индонезия','Jenius','40','75'],['Индонезия','Ova','40','75'],

    ['Филиппины','Gotyme','40','75'],['Филиппины','Palawan Pay','40','75'],
    ['Филиппины','Esim','10','20'],['Филиппины','Sim','5','10'],['Филиппины','Биржа','15','25'],
    ['Нигерия','Kuda','40','70'],['Нигерия','Paga','30','70'],
    ['Нигерия','Opay','40','80'],['Нигерия','Gigbanc','—','80'],
    ['Нигерия','Esim','—','25'],['Нигерия','Binance/Bybit','—','30'],
    ['Пакистан','Nanapay','—','110'],['Пакистан','Sandapay','—','130'],

    ['Колумбия','Nequi','—','130'],['Колумбия','Banco Daviplata','—','130'],

    ['Индия','Fino Savings','—','300'],['Индия','Jio','—','320'],
    ['Индия','Kotak','—','400'],['Индия','Airtel Bank','—','300'],
    ['Индия','IPPB','—','300'],['Индия','Unity','—','385'],
    ['Индия','Omnicard','—','260'],['Индия','Axis','—','750'],
    ['Индия','SBI','—','750'],['Индия','Bank of Baroda','—','750'],
    ['Индия','Indian Bank','—','700'],['Индия','Esim','—','70'],
    ['Индия','Roaming','—','20'],['Индия','Биржа','—','30'],
  ];
  const names = [];
  raw.forEach(r => { if (!names.includes(r[0])) names.push(r[0]); });
  data.countries = names.map(n => ({ name: n, flag: FLAGS[n] || '' }));
  data.banks = raw.map((r, i) => ({ id: i+1, country: r[0], name: r[1], buy: r[2], sell: r[3], desc: '' }));

function saveData() { localStorage.setItem('bankportal_data', JSON.stringify(data)); }

// ── HISTORY (undo) ──
let history = [];
function pushHistory() {
  history.push(JSON.stringify(data));
  if (history.length > 20) history.shift();
  const btn = document.getElementById('undoBtn');
  if (btn) btn.disabled = false;
}
function undoLast() {
  if (!history.length) return;
  data = JSON.parse(history.pop());
  saveData();
  renderCountryList(); renderManageList();
  if (selectedCountry) renderMain();
  const btn = document.getElementById('undoBtn');
  if (btn) btn.disabled = history.length === 0;
  showStatus('Отменено');
}

// ── CONFIRM DIALOG ──
let confirmResolve = null;
function showConfirm(msg) {
  return new Promise(resolve => {
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOverlay').classList.add('open');
    confirmResolve = (val) => {
      document.getElementById('confirmOverlay').classList.remove('open');
      resolve(val);
    };
  });
}

function handleSearch() {
  const q = document.getElementById('sidebarSearch').value.trim().toLowerCase();
  const label = document.getElementById('searchModeLabel');
  if (!q) { label.classList.remove('visible'); renderCountryList(); return; }
  label.classList.add('visible');
  const matchC = data.countries.filter(c => c.name.toLowerCase().includes(q));
  const matchB = data.banks.filter(b => b.name.toLowerCase().includes(q));
  let html = '';
  if (matchC.length) {
    html += `<div class="search-section-header">Страны</div>`;
    html += matchC.map(c => {
      const count = data.banks.filter(b => b.country === c.name).length;
      const active = selectedCountry === c.name ? 'active' : '';
      return `<div class="country-item ${active}" onclick="selectCountry('${c.name}')">
        <span class="cname">${c.name}</span><span class="count">${count}</span>
      </div>`;
    }).join('');
  }
  if (matchB.length) {
    html += `<div class="search-section-header">Банки</div>`;
    html += matchB.map(b => `
      <div class="bank-search-item" onclick="jumpToBank(${b.id})">
        <div class="bsi-name">${b.name}</div>
        <div class="bsi-country">${b.country}</div>
      </div>`).join('');
  }
  if (!matchC.length && !matchB.length) {
    html = `<div style="padding:20px 18px;color:var(--muted);font-size:13px">Ничего не найдено</div>`;
  }
  document.getElementById('countryList').innerHTML = html;
}

function jumpToBank(id) {
  const bank = data.banks.find(b => b.id === id);
  if (!bank) return;
  selectedCountry = bank.country;
  document.getElementById('sidebarSearch').value = '';
  document.getElementById('searchModeLabel').classList.remove('visible');
  renderCountryList();
  renderMain();
  closeSidebarOnMobile();
  setTimeout(() => openDetail(id), 50);
}

function renderCountryList() {
  document.getElementById('countryList').innerHTML = data.countries.map(c => {
    const count = data.banks.filter(b => b.country === c.name).length;
    const active = selectedCountry === c.name ? 'active' : '';
    return `<div class="country-item ${active}" onclick="selectCountry('${c.name}')">
      <span class="cname">${c.name}</span>
      <span class="count">${count}</span>
    </div>`;
  }).join('');
}

// ── MOBILE SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebarOnMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
}

function selectCountry(name) {
  selectedCountry = name;
  closeDetail();
  renderCountryList();
  renderMain();
  closeSidebarOnMobile();
}

function renderMain() {
  const main = document.getElementById('mainContent');
  if (!selectedCountry) { main.innerHTML = ''; return; }
  const banks = data.banks.filter(b => b.country === selectedCountry);
  main.innerHTML = `
    <div class="main-header">
      <div>
        <div class="main-title">${selectedCountry}</div>
        <div class="main-subtitle">${banks.length} банков</div>
      </div>
      ${isAdmin ? `<button class="btn btn-gold" onclick="openAdmin()">+ Добавить банк</button>` : ''}
    </div>
    <table class="bank-table">
      <thead><tr><th>Банк</th><th>Закуп</th><th>Продажа</th><th></th></tr></thead>
      <tbody>
        ${banks.map(b => {
          const isEsim = b.name.toLowerCase().includes('esim') || (b.name.toLowerCase() === 'sim');
          const isBinance = b.name.toLowerCase().includes('binance') || b.name.toLowerCase().includes('bybit') || b.name.toLowerCase().includes('биржа');
          const isRoaming = b.name.toLowerCase().includes('roaming');
          const rowClass = isEsim ? 'row-esim' : isBinance ? 'row-binance' : isRoaming ? 'row-roaming' : '';
          return `<tr class="bank-row ${rowClass}" onclick="openDetail(${b.id})">
            <td><div class="bank-name">${b.name}</div></td>
            <td class="${b.buy==='—'?'price-na':'price-buy'}">${b.buy==='—'?'—':b.buy}</td>
            <td class="${b.sell==='—'?'price-na':'price-sell'}">${b.sell==='—'?'—':b.sell}</td>
            <td>${b.desc?'<span class="has-desc">описание</span>':''}</td>
          </tr>`;

function openDetail(id) {

  if (!bank) return;
  selectedBank = bank;
  document.getElementById('detailName').textContent = bank.name;
  document.getElementById('detailCountry').textContent = bank.country;
  document.getElementById('detailBuy').textContent = bank.buy === '—' ? '—' : bank.buy;
  document.getElementById('detailSell').textContent = bank.sell === '—' ? '—' : bank.sell;
  const descEl = document.getElementById('detailDesc');
  descEl.innerHTML = bank.desc
    ? `<div class="desc-content">${bank.desc}</div>`
    : `<div class="desc-empty">Описание не добавлено${isAdmin ? '. Нажмите кнопку ниже чтобы добавить.' : '.'}</div>`;
  document.getElementById('detailFooter').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('bankDetail').classList.add('open');
}
function closeDetail() { document.getElementById('bankDetail').classList.remove('open'); selectedBank = null; }

function openEditDesc() {
  if (!selectedBank) return;

  document.getElementById('editBuy').value = selectedBank.buy;
  document.getElementById('editSell').value = selectedBank.sell;
  document.getElementById('editDescOverlay').classList.add('open');
}
function closeEditDesc() { document.getElementById('editDescOverlay').classList.remove('open'); }
async function saveDesc() {
  if (!selectedBank) return;
  const ok = await showConfirm('Сохранить изменения?');
  if (!ok) return;
  pushHistory();
  const idx = data.banks.findIndex(b => b.id === selectedBank.id);
  data.banks[idx].desc = document.getElementById('editDescText').value.trim();
  data.banks[idx].buy = document.getElementById('editBuy').value.trim() || '—';
  data.banks[idx].sell = document.getElementById('editSell').value.trim() || '—';
  selectedBank = data.banks[idx];
  saveData(); closeEditDesc(); openDetail(selectedBank.id); renderMain();
  showStatus('Сохранено');
}

function openLogin() { document.getElementById('loginOverlay').classList.add('open'); }
function closeLogin() {
  document.getElementById('loginOverlay').classList.remove('open');
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}
function doLogin() {
  if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
    isAdmin = true; closeLogin();
    document.getElementById('adminLoginBtn').style.display = 'none';
    document.getElementById('adminPanelBtn').style.display = 'inline-block';

function logout() {
  isAdmin = false;
  document.getElementById('adminLoginBtn').style.display = 'inline-block';
  document.getElementById('adminPanelBtn').style.display = 'none';
  document.getElementById('adminLogoutBtn').style.display = 'none';

let currentTab = 1;
function openAdmin() {
  switchTab(1);
  const opts = data.countries.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  document.getElementById('formCountry').innerHTML = opts;
  if (selectedCountry) document.getElementById('formCountry').value = selectedCountry;
  renderManageList(); renderCountryManageList();
  document.getElementById('adminOverlay').classList.add('open');
}
function closeAdmin() { editingBankId = null; document.getElementById('adminOverlay').classList.remove('open'); }
function switchTab(n) {
  currentTab = n;
  for (let i = 1; i <= 3; i++) {
    document.getElementById('tab'+i).classList.toggle('active', i === n);
    document.getElementById('tabContent'+i).style.display = i === n ? 'block' : 'none';
  }
  if (n === 2) renderManageList();
  if (n === 3) renderCountryManageList();
}
async function saveBank() {
  const country = document.getElementById('formCountry').value;
  const name = document.getElementById('formName').value.trim();
  if (!name) { alert('Введите название банка'); return; }
  const ok = await showConfirm('Сохранить изменения?');
  if (!ok) return;
  pushHistory();
  const buy = document.getElementById('formBuy').value.trim() || '—';
  const sell = document.getElementById('formSell').value.trim() || '—';
  const desc = document.getElementById('formDesc').value.trim();
  if (editingBankId !== null) {
    const idx = data.banks.findIndex(b => b.id === editingBankId);
    if (idx !== -1) data.banks[idx] = { ...data.banks[idx], country, name, buy, sell, desc };
    editingBankId = null;
  } else {
    data.banks.push({ id: Date.now(), country, name, buy, sell, desc });
  }
  saveData();
  ['formName','formBuy','formSell','formDesc'].forEach(id => document.getElementById(id).value = '');
  closeAdmin(); renderCountryList();
  if (selectedCountry === country) renderMain();
  showStatus('Банк сохранён');
}
function renderManageList() {
  const container = document.getElementById('manageList');
  container.innerHTML = '';
  data.countries.forEach(c => {
    const banks = data.banks.filter(b => b.country === c.name);
    if (!banks.length) return;
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:24px;';
    section.innerHTML = `<div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">${c.name}</div>`;
    const list = document.createElement('div');
    list.dataset.country = c.name;
    list.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
    banks.forEach(b => {
      const item = document.createElement('div');
      item.className = 'manage-item';
      item.dataset.id = b.id;
      item.innerHTML = `
        <div class="drag-handle" style="color:var(--muted);margin-right:10px;font-size:18px;padding:0 4px;touch-action:none;user-select:none;cursor:grab;flex-shrink:0">⠿</div>
        <div style="flex:1"><div class="manage-item-name">${b.name}</div></div>
        <div class="manage-item-actions">
          <button class="btn-edit" onclick="editBank(${b.id})">Выбрать</button>
          <button class="btn-del" onclick="deleteBank(${b.id})">Удалить</button>
        </div>`;
      list.appendChild(item);
    });
    section.appendChild(list);
    container.appendChild(section);
    initDragForList(list);
  });
}

function initDragForList(list) {
  let dragging = null;
  let ghost = null;
  let startY = 0;
  let startScrollTop = 0;
  let items = [];
  let placeholder = null;

  function getItems() {
    return Array.from(list.querySelectorAll('.manage-item'));
  }

  function createGhost(item) {
    const g = item.cloneNode(true);
    const rect = item.getBoundingClientRect();
    g.style.cssText = `
      position:fixed;left:${rect.left}px;top:${rect.top}px;
      width:${rect.width}px;height:${rect.height}px;
      opacity:0.85;background:var(--surface3);border:1px solid var(--gold-dim);
      border-radius:3px;z-index:9999;pointer-events:none;
      box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:none;
    `;
    document.body.appendChild(g);
    return g;
  }

  function createPlaceholder(height) {
    const p = document.createElement('div');
    p.style.cssText = `height:${height}px;background:var(--gold-glow);border:1px dashed var(--gold-dim);border-radius:3px;transition:height 0.1s;`;
    return p;
  }

  function getItemAtY(y) {
    const all = getItems();
    for (const it of all) {
      if (it === dragging) continue;
      const r = it.getBoundingClientRect();
      if (y >= r.top && y <= r.bottom) return it;
    }
    return null;
  }

  function onStart(e) {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    e.preventDefault();

    dragging = handle.closest('.manage-item');
    items = getItems();
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    startScrollTop = list.scrollTop;

    const rect = dragging.getBoundingClientRect();
    ghost = createGhost(dragging);
    placeholder = createPlaceholder(rect.height);
    dragging.style.opacity = '0';
    dragging.parentNode.insertBefore(placeholder, dragging);
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;

    ghost.style.top = (clientY - ghost.offsetHeight / 2) + 'px';
    ghost.style.left = (clientX - ghost.offsetWidth / 2) + 'px';

    const target = getItemAtY(clientY);
    if (target) {
      const tRect = target.getBoundingClientRect();
      const mid = tRect.top + tRect.height / 2;
      if (clientY < mid) {
        list.insertBefore(placeholder, target);
      } else {
        list.insertBefore(placeholder, target.nextSibling);
      }
    }
  }

  function onEnd(e) {
    if (!dragging) return;
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

    // insert dragging where placeholder is
    list.insertBefore(dragging, placeholder);
    placeholder.remove();
    ghost.remove();
    dragging.style.opacity = '';
    dragging = null;
    ghost = null;
    placeholder = null;

    // rebuild data order from DOM
    const newOrder = Array.from(list.querySelectorAll('.manage-item')).map(el => parseInt(el.dataset.id));
    const country = list.dataset.country;
    const otherBanks = data.banks.filter(b => b.country !== country);
    const reordered = newOrder.map(id => data.banks.find(b => b.id === id)).filter(Boolean);

    // check if order actually changed
    const oldOrder = data.banks.filter(b => b.country === country).map(b => b.id);
    if (JSON.stringify(oldOrder) === JSON.stringify(newOrder)) return;

    pushHistory();
    // merge: keep global order for other countries, replace this country's banks in position
    const firstIdx = data.banks.findIndex(b => b.country === country);
    data.banks = data.banks.filter(b => b.country !== country);
    data.banks.splice(firstIdx, 0, ...reordered);
    saveData();
    if (selectedCountry === country) renderMain();
  }

  list.addEventListener('mousedown', onStart);
  list.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}
let editingBankId = null;
function editBank(id) {
  const b = data.banks.find(x => x.id === id);
  if (!b) return;
  editingBankId = id;
  switchTab(1);
  const opts = data.countries.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  document.getElementById('formCountry').innerHTML = opts;
  document.getElementById('formCountry').value = b.country;
  document.getElementById('formName').value = b.name;
  document.getElementById('formBuy').value = b.buy === '—' ? '' : b.buy;
  document.getElementById('formSell').value = b.sell === '—' ? '' : b.sell;
  document.getElementById('formDesc').value = b.desc;
}
async function deleteBank(id, silent = false) {
  if (!silent) {
    const ok = await showConfirm('Удалить этот банк?');
    if (!ok) return;
    pushHistory();
  }
  data.banks = data.banks.filter(b => b.id !== id);
  saveData(); renderManageList(); renderCountryList();
  if (selectedCountry) renderMain();
  if (!silent) showStatus('Банк удалён');
}
function addCountry() {
  const name = document.getElementById('formCountryName').value.trim();
  if (!name) { alert('Введите название страны'); return; }
  if (data.countries.find(c => c.name === name)) { alert('Такая страна уже есть'); return; }
  data.countries.push({ name, flag: '' });
  saveData();
  document.getElementById('formCountryName').value = '';
  renderCountryList(); renderCountryManageList();
  showStatus('Страна добавлена');
}
function renderCountryManageList() {
  document.getElementById('countryManageList').innerHTML = data.countries.map(c => `
    <div class="manage-item">
      <div class="manage-item-name">${c.name}</div>
      <div class="manage-item-actions">
        <button class="btn-del" onclick="deleteCountry('${c.name}')">Удалить</button>
      </div>
    </div>`).join('');
}
async function deleteCountry(name) {
  const ok = await showConfirm(`Удалить страну "${name}" и все её банки?`);
  if (!ok) return;
  pushHistory();
  data.countries = data.countries.filter(c => c.name !== name);
  data.banks = data.banks.filter(b => b.country !== name);
  saveData();
  if (selectedCountry === name) { selectedCountry = null; renderMain(); }
  renderCountryList(); renderCountryManageList();
  showStatus('Страна удалена');
}
function showStatus(msg) {
  const bar = document.getElementById('statusBar');
  bar.textContent = '✓ ' + msg;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 2500);
}

initData();
renderCountryList();
renderMain();
</script>
</body>
</html>
