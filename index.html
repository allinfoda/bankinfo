<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страны и Банки</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #ede9e3;
    --border: #ddd8d0;
    --accent: #c0392b;
    --text: #1a1612;
    --muted: #8c8078;
    --buy: #1a6b3a;
    --sell: #c0392b;
    --sidebar-bg: #1a1612;
    --sidebar-text: #d4cfc8;
    --sidebar-muted: #6b6560;
    --header-bg: #1a1612;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Mulish', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 14px 32px;
    background: var(--header-bg);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #2e2820;
  }
  .header-nav { display: flex; gap: 10px; align-items: center; }
  .btn {
    font-family: 'Mulish', sans-serif;
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-weight: 600;
  }
  .btn-ghost { background: transparent; color: #8c8078; border: 1px solid #2e2820; }
  .btn-ghost:hover { color: #d4cfc8; border-color: #4a4440; }
  .btn-accent { background: var(--accent); color: #fff; font-weight: 700; }
  .btn-accent:hover { background: #a93226; }

  .layout { display: flex; height: calc(100vh - 53px); }

  .sidebar {
    width: 250px;
    min-width: 250px;
    background: var(--sidebar-bg);
    border-right: 1px solid #2e2820;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search { padding: 14px; border-bottom: 1px solid #2e2820; }
  .sidebar-search input {
    width: 100%;
    background: #252018;
    border: 1px solid #2e2820;
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--sidebar-text);
    font-family: 'Mulish', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--sidebar-muted); }
  .search-mode-label { font-size: 11px; color: var(--sidebar-muted); margin-top: 7px; padding: 0 2px; display: none; }
  .search-mode-label.visible { display: block; }

  .country-list { overflow-y: auto; flex: 1; padding: 6px 0; }
  .search-section-header {
    font-size: 10px;
    color: var(--sidebar-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 10px 18px 4px;
    font-weight: 700;
  }
  .country-item {
    padding: 11px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--sidebar-text);
    transition: all 0.15s;
  }
  .country-item:hover { background: #252018; }
  .country-item.active { color: #fff; background: rgba(192,57,43,0.12); }
  .country-item .flag { font-size: 16px; flex-shrink: 0; }
  .country-item .count {
    margin-left: auto;
    font-size: 11px;
    color: var(--sidebar-muted);
    background: #252018;
    padding: 1px 7px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .country-item.active .count { background: rgba(192,57,43,0.25); color: #e88b82; }

  .bank-search-item {
    padding: 9px 18px;
    cursor: pointer;
    font-size: 13px;
    color: var(--sidebar-text);
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .bank-search-item:hover { background: #252018; }
  .bank-search-item .bsi-name { font-weight: 600; }
  .bank-search-item .bsi-country { font-size: 11px; color: var(--sidebar-muted); }

  .main { flex: 1; overflow-y: auto; padding: 36px 40px; }
  .main-header {
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 20px;
  }
  .main-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 900; letter-spacing: -0.5px; }
  .main-subtitle { color: var(--muted); font-size: 13px; margin-top: 5px; }

  .bank-table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
  .bank-table th {
    text-align: left;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 10px 16px;
    border-bottom: none;
    font-weight: 700;
  }
  .bank-table td { padding: 0; }
  .bank-row { cursor: pointer; transition: background 0.12s; }
  .bank-row:hover td { background: #ede9e3; }
  .bank-row td { padding: 13px 16px; font-size: 14px; vertical-align: middle; }
  .bank-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .bank-name .marker { display: none; }
  .bank-row:hover .marker { display: none; }
  .price-buy { color: var(--buy); font-weight: 700; }
  .price-sell { color: var(--sell); font-weight: 700; }
  .price-na { color: #bbb; }
  .has-desc {
    font-size: 11px;
    color: var(--accent);
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.2);
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 600;
  }

  .bank-detail {
    position: fixed;
    right: 0; top: 53px;
    width: 400px;
    height: calc(100vh - 53px);
    background: var(--surface);
    border-left: none;
    display: none;
    flex-direction: column;
    z-index: 50;
    animation: slideIn 0.22s ease;
    box-shadow: -8px 0 32px rgba(0,0,0,0.08);
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .bank-detail.open { display: flex; }
  .detail-header {
    padding: 24px;
    border-bottom: none;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: var(--bg);
  }
  .detail-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
  .detail-country { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); background: var(--border); }
  .detail-prices { display: flex; padding: 20px 24px; gap: 12px; background: var(--bg); }
  .price-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; text-align: center; }
  .price-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700; }
  .price-value { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
  .detail-desc { flex: 1; padding: 20px 24px; overflow-y: auto; }
  .desc-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 700; }
  .desc-content { font-size: 14px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
  .desc-empty { color: var(--muted); font-size: 13px; font-style: italic; }
  .detail-footer { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg); }

  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; }
  .welcome-icon { font-size: 52px; margin-bottom: 18px; }
  .welcome h2 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--muted); }
  .welcome p { color: var(--muted); font-size: 14px; margin-top: 8px; opacity: 0.7; }

  .admin-overlay {
    position: fixed; inset: 0;
    background: rgba(26,22,18,0.65);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .admin-overlay.open { display: flex; }
  .admin-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    animation: fadeUp 0.22s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .admin-modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 24px; color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 13px;
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

  .login-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 360px;
    padding: 32px;
    animation: fadeUp 0.22s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .login-modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .login-modal p { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  .login-error { color: var(--accent); font-size: 13px; margin-top: 8px; display: none; font-weight: 600; }

  .admin-tabs { display: flex; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
  .admin-tab { flex: 1; padding: 9px; text-align: center; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.2s; font-weight: 600; border-right: 1px solid var(--border); }
  .admin-tab:last-child { border-right: none; }
  .admin-tab.active { background: var(--accent); color: #fff; }
  .admin-tab:not(.active):hover { background: var(--bg); color: var(--text); }

  .manage-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border-radius: 5px; margin-bottom: 7px; font-size: 13px; border: 1px solid var(--border); }
  .manage-item-name { flex: 1; font-weight: 600; }
  .manage-item-country { color: var(--muted); font-size: 12px; }
  .manage-item-actions { display: flex; gap: 6px; }
  .btn-edit { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: 'Mulish', sans-serif; font-size: 12px; transition: all 0.2s; font-weight: 600; }
  .btn-edit:hover { color: var(--text); background: var(--surface2); }
  .btn-del { background: transparent; border: 1px solid transparent; color: var(--muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: 'Mulish', sans-serif; font-size: 12px; transition: all 0.2s; font-weight: 600; }
  .btn-del:hover { color: var(--accent); border-color: var(--accent); background: rgba(192,57,43,0.05); }

  .status-bar {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--text); color: #f5f2ee;
    padding: 10px 18px; border-radius: 5px;
    font-weight: 700; font-size: 13px;
    display: none; z-index: 500;
    animation: fadeUp 0.2s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .status-bar.show { display: block; }

  .admin-indicator { display: none; align-items: center; gap: 8px; background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.3); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #e88b82; font-weight: 600; }
  .admin-indicator.visible { display: flex; }
  .admin-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .important-section {
    margin-top: 40px;
    padding: 24px 28px;
    background: #fff8f0;
    border-radius: 8px;
    border: 1px solid #f0d9c0;
  }
  .important-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #a0522d;
    margin-bottom: 12px;
  }
  .important-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
  }
  .important-section {
    margin-top: 36px;
    padding: 24px 28px;
    background: var(--surface);
    border-radius: 6px;
  }
  .important-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .important-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }
  .important-edit-btn {
    margin-top: 14px;
    display: inline-block;
  }
</style>
</head>
<body>

<header>
  <div class="header-nav">
    <div class="admin-indicator" id="adminIndicator"><div class="admin-dot"></div>Режим администратора</div>
    <button class="btn btn-ghost" id="adminLoginBtn" onclick="openLogin()">Войти как админ</button>
    <button class="btn btn-accent" id="adminPanelBtn" onclick="openAdmin()" style="display:none">Управление</button>
    <button class="btn btn-ghost" id="adminLogoutBtn" onclick="logout()" style="display:none">Выйти</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="sidebarSearch" placeholder="Поиск страны или банка..." oninput="handleSearch()">
      <div class="search-mode-label" id="searchModeLabel">Результаты поиска</div>
    </div>
    <div class="country-list" id="countryList"></div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<!-- BANK DETAIL PANEL -->
<div class="bank-detail" id="bankDetail">
  <div class="detail-header">
    <div>
      <div class="detail-title" id="detailName"></div>
      <div class="detail-country" id="detailCountry"></div>
    </div>
    <button class="close-btn" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-prices">
    <div class="price-card">
      <div class="price-label">Закуп</div>
      <div class="price-value price-buy" id="detailBuy"></div>
    </div>
    <div class="price-card">
      <div class="price-label">Продажа</div>
      <div class="price-value price-sell" id="detailSell"></div>
    </div>
  </div>
  <div class="detail-desc">
    <div class="desc-label">Описание</div>
    <div id="detailDesc"></div>
  </div>
  <div class="detail-footer" id="detailFooter" style="display:none">
    <button class="btn btn-accent" style="width:100%" onclick="openEditDesc()">✏ Редактировать описание</button>
  </div>
</div>

<!-- LOGIN -->
<div class="admin-overlay" id="loginOverlay">
  <div class="login-modal">
    <h2>Вход для админа</h2>
    <p>Введите пароль для доступа к панели управления</p>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="loginError">Неверный пароль</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="border-color:var(--border);color:var(--muted)" onclick="closeLogin()">Отмена</button>
      <button class="btn btn-accent" onclick="doLogin()">Войти</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-modal">
    <h2>Панель управления</h2>
    <div class="admin-tabs">
      <div class="admin-tab active" id="tab1" onclick="switchTab(1)">Добавить банк</div>
      <div class="admin-tab" id="tab2" onclick="switchTab(2)">Список банков</div>
      <div class="admin-tab" id="tab3" onclick="switchTab(3)">Страны</div>
    </div>
    <div id="tabContent1">
      <div class="form-group">
        <label class="form-label">Страна</label>
        <select class="form-select" id="formCountry"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Название банка</label>
        <input type="text" class="form-input" id="formName" placeholder="">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Закуп</label>
          <input type="text" class="form-input" id="formBuy" placeholder="">
        </div>
        <div class="form-group">
          <label class="form-label">Продажа</label>
          <input type="text" class="form-input" id="formSell" placeholder="">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="formDesc" placeholder=""></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" style="border-color:var(--border);color:var(--muted)" onclick="closeAdmin()">Отмена</button>
        <button class="btn btn-accent" onclick="saveBank()">Сохранить</button>
      </div>
    </div>
    <div id="tabContent2" style="display:none">
      <div class="form-group">
        <label class="form-label">Фильтр по стране</label>
        <select class="form-select" id="filterCountry" onchange="renderManageList()"><option value="">Все страны</option></select>
      </div>
      <div id="manageList"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" style="border-color:var(--border);color:var(--muted)" onclick="closeAdmin()">Закрыть</button>
      </div>
    </div>
    <div id="tabContent3" style="display:none">
      <div class="form-group">
        <label class="form-label">Название страны</label>
        <input type="text" class="form-input" id="formCountryName" placeholder="">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" style="border-color:var(--border);color:var(--muted)" onclick="closeAdmin()">Отмена</button>
        <button class="btn btn-accent" onclick="addCountry()">Добавить страну</button>
      </div>
      <div style="margin-top:20px" id="countryManageList"></div>
    </div>
  </div>
</div>

<!-- EDIT DESC -->
<div class="admin-overlay" id="editDescOverlay">
  <div class="admin-modal" style="width:480px">
    <h2>✏ Редактировать</h2>
    <div class="form-group">
      <textarea class="form-textarea" id="editDescText" style="min-height:180px"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Закуп</label>
        <input type="text" class="form-input" id="editBuy">
      </div>
      <div class="form-group">
        <label class="form-label">Продажа</label>
        <input type="text" class="form-input" id="editSell">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="border-color:var(--border);color:var(--muted)" onclick="closeEditDesc()">Отмена</button>
      <button class="btn btn-accent" onclick="saveDesc()">Сохранить</button>
    </div>
  </div>
</div>

<!-- IMPORTANT EDIT -->
<div class="admin-overlay" id="importantOverlay">
  <div class="admin-modal" style="width:500px">
    <h2>Важно!</h2>
    <div class="form-group">
      <textarea class="form-textarea" id="importantTextEdit" style="min-height:200px" placeholder="Введите важную информацию..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="border-color:var(--border);color:var(--muted)" onclick="closeImportantEdit()">Отмена</button>
      <button class="btn btn-accent" onclick="saveImportant()">Сохранить</button>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<script>
const ADMIN_PASSWORD = 'admin123';
let isAdmin = false;
let selectedCountry = null;
let selectedBank = null;

const FLAGS = {
  'Аргентина':'🇦🇷','Мексика':'🇲🇽','Перу':'🇵🇪','Боливия':'🇧🇴',
  'Чили':'🇨🇱','Венесуэла':'🇻🇪','Индонезия':'🇮🇩','Филиппины':'🇵🇭',
  'Нигерия':'🇳🇬','Пакистан':'🇵🇰','Колумбия':'🇨🇴','Индия':'🇮🇳'
};

let data = { countries: [], banks: [] };

function initData() {
  const saved = localStorage.getItem('bankportal_data');
  if (saved) { data = JSON.parse(saved); return; }
  const raw = [
    ['Аргентина','Astropay','20','35'],['Аргентина','Persanal','20','50'],

function saveData() { localStorage.setItem('bankportal_data', JSON.stringify(data)); }

function handleSearch() {
  const q = document.getElementById('sidebarSearch').value.trim().toLowerCase();
  const label = document.getElementById('searchModeLabel');
  if (!q) { label.classList.remove('visible'); renderCountryList(); return; }
  label.classList.add('visible');
  const matchC = data.countries.filter(c => c.name.toLowerCase().includes(q));
  const matchB = data.banks.filter(b => b.name.toLowerCase().includes(q));
  let html = '';
  if (matchC.length) {
    html += `<div class="search-section-header">Страны</div>`;
    html += matchC.map(c => {
      const count = data.banks.filter(b => b.country === c.name).length;
      const active = selectedCountry === c.name ? 'active' : '';
      return `<div class="country-item ${active}" onclick="selectCountry('${c.name}')">
        <span>${c.name}</span>
        <span class="count">${count}</span>
      </div>`;
    }).join('');
  }
  if (matchB.length) {
    html += `<div class="search-section-header">Банки</div>`;
    html += matchB.map(b => `
      <div class="bank-search-item" onclick="jumpToBank(${b.id})">
        <div class="bsi-name">${b.name}</div>
        <div class="bsi-country">${b.country}</div>
      </div>`).join('');
  }
  if (!matchC.length && !matchB.length) {
    html = `<div style="padding:20px 18px;color:var(--sidebar-muted);font-size:13px">Ничего не найдено</div>`;
  }
  document.getElementById('countryList').innerHTML = html;
}

function getFlagForCountry(name) {
  const c = data.countries.find(x => x.name === name);
  return c ? (c.flag || '') : '';
}

function jumpToBank(id) {
  const bank = data.banks.find(b => b.id === id);
  if (!bank) return;
  selectedCountry = bank.country;
  document.getElementById('sidebarSearch').value = '';
  document.getElementById('searchModeLabel').classList.remove('visible');
  renderCountryList();
  renderMain();
  setTimeout(() => openDetail(id), 50);
}

function renderCountryList() {
  document.getElementById('countryList').innerHTML = data.countries.map(c => {
    const count = data.banks.filter(b => b.country === c.name).length;
    const active = selectedCountry === c.name ? 'active' : '';
    return `<div class="country-item ${active}" onclick="selectCountry('${c.name}')">
      <span>${c.name}</span>
      <span class="count">${count}</span>
    </div>`;
  }).join('');
}

function selectCountry(name) {
  selectedCountry = name;
  closeDetail();
  renderCountryList();
  renderMain();
}

function renderMain() {
  const main = document.getElementById('mainContent');
  if (!selectedCountry) { main.innerHTML = ''; return; }
  const banks = data.banks.filter(b => b.country === selectedCountry);
  const country = data.countries.find(c => c.name === selectedCountry);
  const flag = country ? (country.flag || '') : '';
  main.innerHTML = `
    <div class="main-header">
      <div>
        <div class="main-title">${selectedCountry}</div>
        <div class="main-subtitle">${banks.length} банков</div>
      </div>
      ${isAdmin ? `<button class="btn btn-accent" onclick="openAdmin()">+ Добавить банк</button>` : ''}
    </div>
    <table class="bank-table">
      <thead><tr><th>Банк</th><th>Закуп</th><th>Продажа</th><th></th></tr></thead>
      <tbody>
        ${banks.map(b => `
          <tr class="bank-row" onclick="openDetail(${b.id})">
            <td><div class="bank-name"><div class="marker"></div>${b.name}</div></td>
            <td class="${b.buy==='—'?'price-na':'price-buy'}">${b.buy==='—'?'—':b.buy}</td>
            <td class="${b.sell==='—'?'price-na':'price-sell'}">${b.sell==='—'?'—':b.sell}</td>
            <td>${b.desc?'<span class="has-desc">описание</span>':''}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    ${renderImportant(selectedCountry)}`;
}

function openDetail(id) {
  const bank = data.banks.find(b => b.id === id);
  if (!bank) return;
  selectedBank = bank;
  const country = data.countries.find(c => c.name === bank.country);
  document.getElementById('detailName').textContent = bank.name;
  document.getElementById('detailCountry').textContent = bank.country;
  document.getElementById('detailBuy').textContent = bank.buy==='—' ? '—' : bank.buy;
  document.getElementById('detailSell').textContent = bank.sell==='—' ? '—' : bank.sell;
  const descEl = document.getElementById('detailDesc');
  descEl.innerHTML = bank.desc
    ? `<div class="desc-content">${bank.desc}</div>`
    : `<div class="desc-empty">Описание не добавлено${isAdmin?'. Нажмите кнопку ниже чтобы добавить.':'.'}</div>`;
  document.getElementById('detailFooter').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('bankDetail').classList.add('open');
}
function closeDetail() { document.getElementById('bankDetail').classList.remove('open'); selectedBank = null; }

function openEditDesc() {
  if (!selectedBank) return;
  document.getElementById('editDescText').value = selectedBank.desc || '';
  document.getElementById('editBuy').value = selectedBank.buy;
  document.getElementById('editSell').value = selectedBank.sell;
  document.getElementById('editDescOverlay').classList.add('open');
}
function closeEditDesc() { document.getElementById('editDescOverlay').classList.remove('open'); }
function saveDesc() {
  if (!selectedBank) return;
  const idx = data.banks.findIndex(b => b.id === selectedBank.id);
  data.banks[idx].desc = document.getElementById('editDescText').value.trim();
  data.banks[idx].buy = document.getElementById('editBuy').value.trim() || '—';
  data.banks[idx].sell = document.getElementById('editSell').value.trim() || '—';
  selectedBank = data.banks[idx];
  saveData(); closeEditDesc(); openDetail(selectedBank.id); renderMain();
  showStatus('Описание сохранено!');
}

function openLogin() { document.getElementById('loginOverlay').classList.add('open'); }
function closeLogin() {
  document.getElementById('loginOverlay').classList.remove('open');
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}
function doLogin() {
  if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
    isAdmin = true; closeLogin();
    document.getElementById('adminLoginBtn').style.display = 'none';
    document.getElementById('adminPanelBtn').style.display = 'inline-block';
    document.getElementById('adminLogoutBtn').style.display = 'inline-block';
    document.getElementById('adminIndicator').classList.add('visible');
    renderMain();
    if (selectedBank) openDetail(selectedBank.id);
    showStatus('Добро пожаловать, администратор!');
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout() {
  isAdmin = false;
  document.getElementById('adminLoginBtn').style.display = 'inline-block';
  document.getElementById('adminPanelBtn').style.display = 'none';
  document.getElementById('adminLogoutBtn').style.display = 'none';
  document.getElementById('adminIndicator').classList.remove('visible');
  closeDetail(); renderMain();
}

let currentTab = 1;
function openAdmin() {
  switchTab(1);
  const opts = data.countries.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  document.getElementById('formCountry').innerHTML = opts;
  if (selectedCountry) document.getElementById('formCountry').value = selectedCountry;
  document.getElementById('filterCountry').innerHTML = '<option value="">Все страны</option>' + opts;
  renderManageList(); renderCountryManageList();
  document.getElementById('adminOverlay').classList.add('open');
}
function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); }
function switchTab(n) {
  currentTab = n;
  for (let i=1;i<=3;i++) {
    document.getElementById('tab'+i).classList.toggle('active', i===n);
    document.getElementById('tabContent'+i).style.display = i===n?'block':'none';
  }
  if (n===2) renderManageList();
  if (n===3) renderCountryManageList();
}
function saveBank() {
  const country = document.getElementById('formCountry').value;
  const name = document.getElementById('formName').value.trim();
  if (!name) { alert('Введите название банка'); return; }
  data.banks.push({ id: Date.now(), country, name,
    buy: document.getElementById('formBuy').value.trim() || '—',
    sell: document.getElementById('formSell').value.trim() || '—',
    desc: document.getElementById('formDesc').value.trim()
  });
  saveData();
  ['formName','formBuy','formSell','formDesc'].forEach(id => document.getElementById(id).value = '');
  closeAdmin(); renderCountryList();
  if (selectedCountry === country) renderMain();
  showStatus('Банк добавлен!');
}
function renderManageList() {
  const filterC = document.getElementById('filterCountry').value;
  const banks = filterC ? data.banks.filter(b => b.country===filterC) : data.banks;
  document.getElementById('manageList').innerHTML = banks.map(b => `
    <div class="manage-item">
      <div><div class="manage-item-name">${b.name}</div><div class="manage-item-country">${b.country}</div></div>
      <div class="manage-item-actions">
        <button class="btn-edit" onclick="editBank(${b.id})">Выбрать</button>
        <button class="btn-del" onclick="deleteBank(${b.id})">Удалить</button>
      </div>
    </div>`).join('') || '<div style="color:var(--muted);font-size:13px">Нет банков</div>';
}
function editBank(id) {
  const b = data.banks.find(x => x.id===id);
  if (!b) return;
  switchTab(1);
  const opts = data.countries.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  document.getElementById('formCountry').innerHTML = opts;
  document.getElementById('formCountry').value = b.country;
  document.getElementById('formName').value = b.name;
  document.getElementById('formBuy').value = b.buy==='—'?'':b.buy;
  document.getElementById('formSell').value = b.sell==='—'?'':b.sell;
  document.getElementById('formDesc').value = b.desc;
  deleteBank(id, true);
}
function deleteBank(id, silent=false) {
  if (!silent && !confirm('Удалить этот банк?')) return;
  data.banks = data.banks.filter(b => b.id!==id);
  saveData(); renderManageList(); renderCountryList();
  if (selectedCountry) renderMain();
  if (!silent) showStatus('Банк удалён');
}
function renderImportant(country) {
  const note = (data.important && data.important[country]) || '';
  const editBtn = isAdmin ? `<button class="btn btn-ghost" style="font-size:12px;padding:5px 12px;margin-top:10px;border-color:var(--border);color:var(--muted)" onclick="openImportantEdit()">Редактировать</button>` : '';
  return `<div class="important-section">
    <div class="important-title">Важно!</div>
    <div class="important-text" id="importantText">${note ? note.replace(/\n/g,'<br>') : '<span style="color:var(--muted);font-style:italic">Нет записей</span>'}</div>
    ${editBtn}
  </div>`;
}

function openImportantEdit() {
  if (!selectedCountry) return;
  const note = (data.important && data.important[selectedCountry]) || '';
  document.getElementById('importantTextEdit').value = note;
  document.getElementById('importantOverlay').classList.add('open');
}
function closeImportantEdit() { document.getElementById('importantOverlay').classList.remove('open'); }
function saveImportant() {
  if (!data.important) data.important = {};
  data.important[selectedCountry] = document.getElementById('importantTextEdit').value.trim();
  saveData();
  closeImportantEdit();
  renderMain();
  showStatus('Сохранено!');
}

function addCountry() {
  const name = document.getElementById('formCountryName').value.trim();
  if (!name) { alert('Введите название страны'); return; }
  if (data.countries.find(c => c.name===name)) { alert('Такая страна уже есть'); return; }
  data.countries.push({ name, flag: '' });
  saveData();
  document.getElementById('formCountryName').value = '';
  renderCountryList(); renderCountryManageList();
  showStatus('Страна добавлена!');
}
function renderCountryManageList() {
  document.getElementById('countryManageList').innerHTML = data.countries.map(c => `
    <div class="manage-item">
      <div class="manage-item-name">${c.name}</div>
      <div class="manage-item-actions">
        <button class="btn-del" onclick="deleteCountry('${c.name}')">Удалить</button>
      </div>
    </div>`).join('');
}
function deleteCountry(name) {
  if (!confirm(`Удалить страну "${name}" и все её банки?`)) return;
  data.countries = data.countries.filter(c => c.name!==name);
  data.banks = data.banks.filter(b => b.country!==name);
  saveData();
  if (selectedCountry===name) { selectedCountry=null; renderMain(); }
  renderCountryList(); renderCountryManageList();
  showStatus('Страна удалена');
}
function showStatus(msg) {
  const bar = document.getElementById('statusBar');
  bar.textContent = '✓ ' + msg;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 2500);
}

initData();
renderCountryList();
renderMain();
</script>
